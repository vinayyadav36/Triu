name: CI — Lint · Test · Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. LINT — frontend JS + backend JS
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Lint frontend (src/)
        run: npx eslint src/**/*.js --max-warnings 50 || true

      - name: Lint backend (server/)
        run: npm run lint --prefix server || true

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. BACKEND UNIT TESTS — matrix: Node 18 / 20 / 22 × ubuntu / windows
  # ─────────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          SESSION_SECRET: test-session-secret-for-ci

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. BACKEND INTEGRATION TESTS — matrix: Node 18 / 20 / 22
  # ─────────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          SESSION_SECRET: test-session-secret-for-ci

      - name: Upload coverage report
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. FRONTEND BUILD
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Vite / Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.emproiumvipani.com/api' }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID || '' }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY || '' }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID || '' }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID || '' }}

      - name: Upload build artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. SONARCLOUD — code quality analysis
  # ─────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    # Only run on pushes/PRs to main to conserve SonarCloud quota
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request'
    needs: [test-integration]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full history for blame analysis

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install server deps + generate coverage
        working-directory: server
        run: |
          npm ci
          npm test -- --coverage --coverageDirectory=coverage || true
        env:
          NODE_ENV: test
          SESSION_SECRET: sonar-test-secret

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=vinayyadav36_Triu
            -Dsonar.organization=vinayyadav36
        continue-on-error: true   # Non-blocking until SONAR_TOKEN secret is configured

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. REPORT — gate summary visible on PR
  # ─────────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" ||
                "${{ needs.test-unit.result }}" == "failure" ||
                "${{ needs.test-integration.result }}" == "failure" ||
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed (matrix: Node 18/20/22)"
