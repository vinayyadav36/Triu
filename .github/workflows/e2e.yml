name: E2E Tests — Playwright

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Start backend server (background)
        run: |
          cd server && npm ci && node server.js &
          sleep 5
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST || 'mongodb://localhost:27017/test' }}
          JWT_SECRET: e2e-test-secret
          CLIENT_URL: http://localhost:4173

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/api

      - name: Run Playwright tests
        run: npm run test:e2e:ci
        env:
          BASE_URL: http://localhost:4173
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # LambdaTest Cross-Browser (runs on pushes to main only to save quota)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-lambdatest:
    name: LambdaTest Browser Grid
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 45
    needs: [e2e]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run LambdaTest browser suite
        run: npm run test:browser
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
          BASE_URL: ${{ secrets.STAGING_URL || 'https://emproiumvipani.com' }}
        continue-on-error: true

      - name: Upload LambdaTest results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lambdatest-results
          path: lambdatest-results/
          retention-days: 14
