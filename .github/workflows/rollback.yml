name: Rollback — Emergency Revert

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Environment to roll back'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]
      rollback_sha:
        description: 'Git SHA to roll back to (leave blank for previous release tag)'
        required: false
      reason:
        description: 'Reason for rollback (logged in audit trail)'
        required: true

concurrency:
  group: rollback-${{ github.event.inputs.target_env }}
  cancel-in-progress: false   # Never cancel a rollback

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Resolve the target SHA
  # ─────────────────────────────────────────────────────────────────────────────
  resolve-target:
    name: Resolve Rollback Target
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve SHA
        id: resolve
        run: |
          TARGET="${{ github.event.inputs.rollback_sha }}"
          if [[ -z "${TARGET}" ]]; then
            # Default: second most recent tag (the previous release)
            TARGET=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | sed -n '2p')
            echo "No SHA provided — using previous release tag: ${TARGET}"
          fi
          if [[ -z "${TARGET}" ]]; then
            # Final fallback: one commit before HEAD
            TARGET=$(git rev-parse HEAD~1)
            echo "No tags found — using HEAD~1: ${TARGET}"
          fi
          echo "sha=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "::notice::Rolling back ${{ github.event.inputs.target_env }} to: ${TARGET}"
          echo "::notice::Reason: ${{ github.event.inputs.reason }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Build + deploy the resolved SHA
  # ─────────────────────────────────────────────────────────────────────────────
  rollback:
    name: Rollback ${{ github.event.inputs.target_env }} → ${{ needs.resolve-target.outputs.sha }}
    runs-on: ubuntu-latest
    needs: [resolve-target]
    environment:
      name: ${{ github.event.inputs.target_env }}

    steps:
      - name: Checkout rollback target
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build rolled-back frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.emproiumvipani.com/api' }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID || '' }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY || '' }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID || '' }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID || '' }}

      # ── Vercel rollback (production) ────────────────────────────────────────
      - name: Deploy rollback to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm i -g vercel@latest
          if [[ "${{ github.event.inputs.target_env }}" == "production" ]]; then
            vercel --token "$VERCEL_TOKEN" --prod --yes
          else
            vercel --token "$VERCEL_TOKEN" --yes
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── GitHub Pages fallback ───────────────────────────────────────────────
      - name: Upload rolled-back artifact (GitHub Pages)
        if: ${{ secrets.VERCEL_TOKEN == '' && github.event.inputs.target_env == 'production' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy rolled-back artifact to GitHub Pages
        if: ${{ secrets.VERCEL_TOKEN == '' && github.event.inputs.target_env == 'production' }}
        uses: actions/deploy-pages@v4

      - name: Log audit trail
        run: |
          echo "🔄 ROLLBACK AUDIT"
          echo "Environment : ${{ github.event.inputs.target_env }}"
          echo "Target SHA  : ${{ needs.resolve-target.outputs.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Reason      : ${{ github.event.inputs.reason }}"
          echo "Timestamp   : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

  # ─────────────────────────────────────────────────────────────────────────────
  # Smoke test after rollback
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-after-rollback:
    name: Smoke Test Post-Rollback
    runs-on: ubuntu-latest
    needs: [rollback]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Wait for deployment to stabilise
        run: sleep 20

      - name: Run smoke tests against rolled-back environment
        run: npm run smoke:test || true
        env:
          SMOKE_BASE_URL: ${{ vars.PRODUCTION_URL }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Notify Discord/Slack on rollback
  # ─────────────────────────────────────────────────────────────────────────────
  notify-rollback:
    name: Notify — Rollback Alert
    runs-on: ubuntu-latest
    needs: [rollback, smoke-after-rollback]
    if: always()

    steps:
      - name: Send Discord alert
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ needs.rollback.result }}"
          SMOKE="${{ needs.smoke-after-rollback.result }}"
          COLOR=16711680  # red = failure
          ICON="❌"
          if [[ "${STATUS}" == "success" && ("${SMOKE}" == "success" || "${SMOKE}" == "skipped") ]]; then
            COLOR=65280  # green = success
            ICON="✅"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${ICON} Rollback — ${{ github.event.inputs.target_env }}\",
                \"description\": \"**Target SHA:** \`${{ needs.resolve-target.outputs.sha }}\`\n**Reason:** ${{ github.event.inputs.reason }}\n**By:** ${{ github.actor }}\n**Status:** ${STATUS} | Smoke: ${SMOKE}\",
                \"color\": ${COLOR},
                \"timestamp\": \"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\"
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ needs.rollback.result }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🔄 *Rollback Alert* — ${{ github.event.inputs.target_env }} rolled back to \`${{ needs.resolve-target.outputs.sha }}\`. Reason: ${{ github.event.inputs.reason }}. Status: ${STATUS}. By: ${{ github.actor }}\"
            }"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
