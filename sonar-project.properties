# SonarCloud project configuration
# https://sonarcloud.io/dashboard?id=vinayyadav36_Triu

sonar.projectKey=vinayyadav36_Triu
sonar.organization=vinayyadav36
sonar.projectName=EmproiumVipani
sonar.projectVersion=1.0

# Source paths (frontend + backend)
sonar.sources=src,server
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.min.js,\
  **/server/db/**,\
  **/tests/**,\
  **/*.test.js,\
  **/*.spec.js

# Test paths
sonar.tests=server/tests,tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# JavaScript / TypeScript
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
